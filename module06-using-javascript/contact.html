<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Contact Me</title>
    <link rel="stylesheet" href="style.css" /> 
    <script src="myJS.js" defer></script>

    </head>   
    <body>
        <header>
            <h1>Contact Me</h1>
            <p id="intro-message">Use this form to send me a message.</p>
            <nav class="topnav"> 
                <a href="index.html">Home</a>
                <a href="hobbies.html">Hobbies</a>
                <a href="contact.html"> Contact Me </a>
    </nav>

        </header>
        <main>
            <form action="#" method="get" id="contact-form">
                <fieldset>
                    <legend id="information-heading">Your informtion</legend>
                    
                    <label for="fullname">Full Name:</label>
                    <input type="text" name="fullname" id="fullname" required>

                    <label for="emailadd"> Email:</label>
                    <input type="email" name="email" id="emailadd" required>
                    <label for="password">Password:</label>
                    <input
                        type="password"
                        name="password"
                        id="password"
                        required
                    >
                    <p id="error-msg-1" class="error-message"></p>

                    <label for="repeatPassword">Repeat Password:</label>
                    <input
                        type="password"
                        name="repeatPassword"
                        id="repeatPassword"
                        required
                    >
                    <p id="error-msg-2" class="error-message"></p>
                    <label for="reason" > Reason for Contact:</label>
                    <select name="reasonforcontact" id="reason">
                        <option value="internship">Internship Opportunity</option>
                        <option value="Project"> Project Collaboration</option>
                        <option value="question"> General Question</option>
                    </select>
                    <label for="c-message" > Message:</label>
                    <textarea name="message" placeholder="Type your message here." rows="6" id="c-message"></textarea>
                </fieldset>
                <fieldset>
                    <legend> Preferences</legend>
                    <h3>Preferred Contact Method</h3>
                    <input type="radio" name="contact" value="email" checked> <label> Email</label>
                    <input type="radio" name="contact" value="phone"> <label> Phone</label>
                    <input type="radio" name="contact" value="social"> <label> Social Media</label>
                <h3> Topics of Interest</h3>
                <input type="checkbox" name="interest" value="web"> <label> Web Developmemnt</label>
                <input type="checkbox" name="interest" value="ux"> <label> UX Design</label>
                <input type="checkbox" name="interest" value="research"> <label> Research</label>
                <input type="checkbox" name="interest" value="sports"> <label>Sports</label>
                
                </fieldset>
                <button type="submit"  id="submit-button"
                onclick="alert('You just clicked submit button')"
                >Submit</button>
               
               
                <button type="reset" id="reset-button">Reset</button>
                <button type="button" id="alert-button"
                    onclick="alert('Welcome to my website!')">
                    Show Alert
                </button>
                <button type="button"  id="window-alert-button"
                    onclick="window.alert('This is window.alert()')">
                    Window Alert
                </button>
                <button type="button" id="confirm-button">
                    Confirm
                </button>
                <button type="button" id="external-button"
                    onclick="myFirstFunction()">
                    External JavaScript
                </button>
            </form>
        </main>
    </body>
</html>
