<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
    <script src="using-JS-2.js" ></script>
</head>
<body>
    <div class="topnav">
        <a href="index.html">Home</a>
        <a  href="news.html">News</a>
        <a class='active' href="contact.html">Contact</a>
        <a href="about.html">About us</a>

    </div>

    <br>
    <br>

    <form>
        <h2>
            Please fill out the form below:
        </h2>
        
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <br>
        <br>

        <label for="Password">Password:</label>
        <input type="password" id="password" name="password">

        <br>
        <br>
        <div id="error-msg-1" style="color:red; font-size: 14px"></div>

        <label for="repeatPassword">Repeat Password:</label>
        <input type="password" id="repeatPassword" name="repeatPassword">

        <br>

        <div id="error-msg-2" style="color:red; font-size: 14px"></div>
        <br><br>
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone" required>
        <br>
        <br>

        <label for="email">Email address:</label>
        <input type="email" id="email" name="email" required>

        <br>
        <br>

        <label>Rate my website:</label>
        <input type="number" id="rate" name="rate" min="1" max="100" required>

        <br><br>
        <label for="category">Category:</label>
        <select id="category" name="category" required>
            <option value="">--Select a category--</option>
            <option value="general">General Inquiry</option>
            <option value="support">Support</option>
            <option value="feedback">Feedback</option>
            <option value="other">Other</option>
        </select>
        <br> <br>
        <label>Contact Preference:</label>
        <input type="checkbox" id="email_pref" name="preference" value="email">
        <label for="email_pref">Email</label>
        <input type="checkbox" id="phone_pref" name="preference" value="phone">
        <label for="phone_pref">Phone</label>
        <input type="checkbox" id="mail_pref" name="preference" value="mail">
        <label for="mail_pref">Mail</label>
        <br><br>

        <label>Gender:</label>
        <input type="radio" id="male" name="gender" value="male" required>
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Other</label>
        <br><br>
        <button type="submit">Submit</button>

    </form>
    
</body>
</html>
